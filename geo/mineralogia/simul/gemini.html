<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Simulatore Eutettico Di-An con Microstruttura</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
        .container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; max-width: 1200px; }
        canvas { background: white; border: 1px solid #ccc; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; height: auto; }
        .controls { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; width: 100%; max-width: 1160px; border: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; }
        .control-group { margin: 5px; }
        button { padding: 8px 16px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #34495e; }
        #status { font-weight: bold; color: #e67e22; min-width: 250px; text-align: center; }
        h2 { margin: 10px 0; }
        .full-width { grid-column: span 3; display: flex; justify-content: center; }
    </style>
</head>
<body>

    <h2>Analisi Termica e Microstrutturale: Diopside - Anortite</h2>
    
    <div class="controls">
        <div class="control-group">
            <label>Composizione ($X_{An}$): </label>
            <input type="range" id="compSlider" min="5" max="95" value="70">
            <span id="compVal">70</span>%
        </div>
        
        <div class="control-group">
            <button onclick="initSim('cool')">Raffreddamento ↓</button>
            <button onclick="initSim('heat')">Riscaldamento ↑</button>
        </div>

        <div id="status">Stato: In attesa</div>
    </div>

    <div class="container">
        <canvas id="phaseCanvas" width="380" height="300"></canvas>
        <div style="text-align:center">
            <canvas id="microCanvas" width="300" height="300" style="border-radius: 50%; border: 4px solid #333;"></canvas>
            <div style="font-weight:bold; margin-top:5px;">Vista Microscopica</div>
        </div>
        <canvas id="tempTimeCanvas" width="380" height="300"></canvas>
        
        <canvas id="solidTimeCanvas" width="380" height="300"></canvas>
        <canvas id="compTimeCanvas" width="380" height="300"></canvas>
        <div style="padding: 20px; font-size: 0.85em; background: #fff; border: 1px solid #ddd;">
            <strong>Legenda Microstruttura:</strong><br><br>
            <span style="color: #27ae60">■</span> Cristalli Primari Diopside<br>
            <span style="color: #2980b9">■</span> Cristalli Primari Anortite<br>
            <span style="color: #777">〓</span> Matrice Eutettica (Lamellare)
        </div>
    </div>

<script>
/** COSTANTI E SETUP **/
const T_Di = 1391, T_An = 1553, T_Eut = 1274, X_Eut = 0.42;
const T_MIN = 1100, T_MAX = 1650, margin = 50;

let history = [], time = 0, isRunning = false, animationId;
let currentT, initialX, currentXLiq, percSolid, mode, latentCounter = 0;

const canvases = {
    phase: document.getElementById('phaseCanvas'),
    micro: document.getElementById('microCanvas'),
    temp: document.getElementById('tempTimeCanvas'),
    solid: document.getElementById('solidTimeCanvas'),
    comp: document.getElementById('compTimeCanvas')
};
const ctxs = Object.fromEntries(Object.entries(canvases).map(([k, v]) => [k, v.getContext('2d')]));

function mapX(val, min, max, w) { return margin + (val - min) * (w - 2 * margin) / (max - min); }
function mapY(val, min, max, h) { return h - margin - (val - min) * (h - 2 * margin) / (max - min); }

/** DISEGNO MICROSTRUTTURA **/
function drawMicrostructure() {
    const ctx = ctxs.micro;
    const w = 300;
    ctx.clearRect(0,0,w,w);

    // Sfondo Liquido (leggermente ingiallito)
    ctx.fillStyle = "#fffbe6";
    ctx.beginPath(); ctx.arc(w/2, w/2, w/2, 0, Math.PI*2); ctx.fill();

    // Calcolo frazioni
    let sStart = (initialX < X_Eut) ? (X_Eut - initialX)/X_Eut : (initialX - X_Eut)/(1 - X_Eut);
    let fPrimaria = Math.min(percSolid, sStart); 
    let fEutettica = Math.max(0, percSolid - sStart);

    // 1. Disegno Matrice Eutettica (Lamellare)
    if (fEutettica > 0) {
        ctx.save();
        ctx.beginPath(); ctx.arc(w/2, w/2, w/2, 0, Math.PI*2); ctx.clip();
        ctx.strokeStyle = "#999"; ctx.lineWidth = 1;
        let step = 4;
        let limit = fEutettica * w; 
        for(let i=0; i<w*2; i+=step) {
            ctx.beginPath();
            ctx.moveTo(0, i); ctx.lineTo(limit, i - limit);
            ctx.stroke();
        }
        ctx.restore();
    }

    // 2. Disegno Cristalli Primari
    if (fPrimaria > 0) {
        ctx.fillStyle = (initialX < X_Eut) ? "#27ae60" : "#2980b9"; // Verde Di, Blu An
        let numSeeds = 8;
        let size = fPrimaria * 35;
        for(let i=0; i<numSeeds; i++) {
            let ang = (i / numSeeds) * Math.PI * 2;
            let r = 70;
            let x = w/2 + Math.cos(ang) * r;
            let y = w/2 + Math.sin(ang) * r;
            
            // Disegno un poligono per simulare il cristallo
            ctx.beginPath();
            for(let j=0; j<6; j++) {
                let px = x + size * Math.cos(j * Math.PI/3);
                let py = y + size * Math.sin(j * Math.PI/3);
                if(j==0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
            }
            ctx.closePath(); ctx.fill();
            ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.stroke();
        }
    }
}

/** LOGICA FISICA **/
function update() {
    if (!isRunning) return;
    let tLiq = (initialX < X_Eut) ? T_Di - (T_Di - T_Eut) * (initialX / X_Eut) : T_An - (T_An - T_Eut) * ((1 - initialX) / (1 - X_Eut));
    const step = 2.0;

    if (mode === 'cool') {
        if (currentT > tLiq + 1) { 
            currentT -= step; currentXLiq = initialX; percSolid = 0;
            document.getElementById('status').innerText = "RAFFREDDAMENTO LIQUIDO";
        } else if (currentT > T_Eut + 1) { 
            currentT -= step * 0.4;
            currentXLiq = (initialX < X_Eut) ? (currentT - T_Di) * X_Eut / (T_Eut - T_Di) : 1 - (currentT - T_An) * (1 - X_Eut) / (T_Eut - T_An);
            percSolid = (initialX < X_Eut) ? (currentXLiq - initialX) / currentXLiq : (initialX - currentXLiq) / (1 - currentXLiq);
            document.getElementById('status').innerText = "FORMAZIONE CRISTALLI PRIMARI";
        } else if (currentT <= T_Eut + 1 && latentCounter < 100) { 
            currentT = T_Eut; currentXLiq = X_Eut; latentCounter += 1.5;
            let sStart = (initialX < X_Eut) ? (X_Eut - initialX)/X_Eut : (initialX - X_Eut)/(1 - X_Eut);
            percSolid = sStart + (latentCounter/100) * (1 - sStart);
            document.getElementById('status').innerText = "SOSTA EUTETTICA (SOLIDIFICAZIONE)";
        } else { 
            currentT -= step; currentXLiq = NaN; percSolid = 1;
            document.getElementById('status').innerText = "RAFFREDDAMENTO SOLIDO";
        }
        if (currentT < T_MIN + 10) isRunning = false;
    } else { // HEATING
        if (currentT < T_Eut - 1) {
            currentT += step; currentXLiq = NaN; percSolid = 1;
            document.getElementById('status').innerText = "RISCALDAMENTO SOLIDO";
        } else if (currentT < T_Eut + 1 && latentCounter < 100) {
            currentT = T_Eut; currentXLiq = X_Eut; latentCounter += 1.5;
            let sEnd = (initialX < X_Eut) ? (X_Eut - initialX)/X_Eut : (initialX - X_Eut)/(1 - X_Eut);
            percSolid = 1 - (latentCounter/100) * (1 - sEnd);
            document.getElementById('status').innerText = "FUSIONE EUTETTICA (ISOTERMA)";
        } else if (currentT < tLiq) {
            currentT += step * 0.4;
            currentXLiq = (initialX < X_Eut) ? (currentT - T_Di) * X_Eut / (T_Eut - T_Di) : 1 - (currentT - T_An) * (1 - X_Eut) / (T_Eut - T_An);
            percSolid = (initialX < X_Eut) ? (currentXLiq - initialX) / currentXLiq : (initialX - currentXLiq) / (1 - currentXLiq);
            document.getElementById('status').innerText = "FUSIONE CRISTALLI PRIMARI";
        } else {
            currentT += step; currentXLiq = initialX; percSolid = 0;
            document.getElementById('status').innerText = "RISCALDAMENTO LIQUIDO";
        }
        if (currentT > T_MAX - 10) isRunning = false;
    }

    time++;
    history.push({ t: time, T: currentT, x: currentXLiq, s: percSolid * 100 });
    drawAll();
    animationId = requestAnimationFrame(update);
}

/** FUNZIONI DISEGNO GRAFICI **/
function drawAxes(ctx, title, xLab, yLab, xMin, xMax, yMin, yMax, xStep, yStep) {
    const w = ctx.canvas.width, h = ctx.canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "#2c3e50"; ctx.font = "bold 12px Arial"; ctx.fillText(title, margin, 20);
    ctx.font = "10px Arial"; ctx.fillText(yLab, 5, margin - 10); ctx.fillText(xLab, w - margin, h - 5);
    ctx.strokeStyle = "#eee"; ctx.beginPath();
    for(let y=yMin; y<=yMax; y+=yStep) { let py = mapY(y, yMin, yMax, h); ctx.moveTo(margin, py); ctx.lineTo(w-margin, py); ctx.fillText(y, 5, py+4); }
    ctx.stroke();
    ctx.strokeStyle = "#333"; ctx.beginPath(); ctx.moveTo(margin, margin); ctx.lineTo(margin, h-margin); ctx.lineTo(w-margin, h-margin); ctx.stroke();
}

function renderTimeGraph(id, key, title, yLab, yMin, yMax, color, yStep, xMax) {
    const ctx = ctxs[id]; const w = ctx.canvas.width, h = ctx.canvas.height;
    drawAxes(ctx, title, "Tempo", yLab, 0, xMax, yMin, yMax, 100, yStep);
    if(history.length < 2) return;
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
    history.forEach((p, i) => {
        if (key === 'x' && isNaN(p[key])) return;
        let px = mapX(i, 0, xMax, w), py = mapY(p[key], yMin, yMax, h);
        if (i === 0 || (key==='x' && isNaN(history[i-1].x))) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    });
    ctx.stroke();
}

function drawAll() {
    const xMax = Math.max(400, time);
    // Diagramma T-X
    drawAxes(ctxs.phase, "Diagramma di Fase T-X", "An %", "T °C", 0, 100, T_MIN, T_MAX, 20, 100);
    const ctxP = ctxs.phase;
    ctxP.setLineDash([4, 4]); ctxP.strokeStyle = "#3498db"; ctxP.beginPath();
    ctxP.moveTo(mapX(0,0,100,380), mapY(T_Di,T_MIN,T_MAX,300)); ctxP.lineTo(mapX(X_Eut*100,0,100,380), mapY(T_Eut,T_MIN,T_MAX,300)); ctxP.lineTo(mapX(100,0,100,380), mapY(T_An,T_MIN,T_MAX,300)); ctxP.stroke();
    ctxP.setLineDash([]); ctxP.strokeStyle = "#e74c3c"; ctxP.strokeRect(margin, mapY(T_Eut,T_MIN,T_MAX,300), 380-2*margin, 1);
    if(history.length > 0) {
        let last = history[history.length-1]; ctxP.fillStyle = "red"; ctxP.beginPath();
        let px = isNaN(last.x) ? initialX*100 : last.x*100;
        ctxP.arc(mapX(px, 0, 100, 380), mapY(last.T, T_MIN, T_MAX, 300), 5, 0, Math.PI*2); ctxP.fill();
    }
    // Altri grafici
    renderTimeGraph('temp', 'T', "Curva Raffr/Risc.", "T °C", T_MIN, T_MAX, "#e67e22", 100, xMax);
    renderTimeGraph('solid', 's', "Frazione Solido", "%", 0, 100, "#9b59b6", 25, xMax);
    renderTimeGraph('comp', 'x', "Comp. Liquido", "X An", 0, 1, "#2980b9", 0.2, xMax);
    drawMicrostructure();
}

function initSim(m) {
    cancelAnimationFrame(animationId);
    history = []; time = 0; latentCounter = 0; isRunning = true; mode = m;
    initialX = document.getElementById('compSlider').value / 100;
    currentT = (mode === 'cool') ? T_MAX - 10 : T_MIN + 10;
    update();
}

document.getElementById('compSlider').oninput = function() {
    document.getElementById('compVal').innerText = this.value;
    initialX = this.value / 100; drawAll();
};

drawAll();
</script>
</body>
</html>
